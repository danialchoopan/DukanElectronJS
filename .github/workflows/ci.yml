name: Build & Test

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, production]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: node scripts/verify.js
