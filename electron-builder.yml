appId: com.hamtraz.accounting
productName: HamTraz Accounting
directories:
  output: release
files:
  - dist-electron/**/*
  - dist/**/*
  - package.json
  - "!node_modules/**/*"
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/bindings/**/*"
  - "node_modules/file-uri-to-path/**/*"
win:
  target:
    - portable
  sign: false
  artifactName: "HamTrazAccounting-${version}.${ext}"
linux:
  target:
    - AppImage
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
