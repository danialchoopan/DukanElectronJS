<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">تراز نوین</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-sm">
                    نرم‌افزار جامع مالی و حسابداری برای مدیریت هوشمند کسب‌وکارهای مدرن.
                </p>

<form class="space-y-lg" id="setupForm">
<!-- Shop Name -->

<!-- Contact & Address -->
<div class="grid grid-cols-1 gap-lg">
<div class="space-y-xs">

<div class="relative">
<input class="w-full px-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:border-primary transition-colors pl-xl text-left" dir="ltr" id="contact_phone" placeholder="0912 000 0000" type="tel"/>
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline-variant">call</span>

<span class="material-symbols-outlined absolute right-md top-4 text-outline-variant">location_on</span>
</div>
</div>

<!-- PIN Code Setup -->

<label class="block font-label-sm text-label-sm text-on-surface-variant">رمز عبور ۴ رقمی (PIN)</label>

<input class="pin-input w-14 h-16 text-center text-numeric-data font-numeric-data border-2 border-outline-variant rounded-xl bg-surface-container-low outline-none transition-all" data-index="0" maxlength="1" type="text"/>

<input class="pin-input w-14 h-16 text-center text-numeric-data font-numeric-data border-2 border-outline-variant rounded-xl bg-surface-container-low outline-none transition-all" data-index="2" maxlength="1" type="text"/>
<input class="pin-input w-14 h-16 text-center text-numeric-data font-numeric-data border-2 border-outline-variant rounded-xl bg-surface-container-low outline-none transition-all" data-index="3" maxlength="1" type="text"/>
</div>

</div>
<!-- Primary Action -->

</p>

</main>
<script>
        // PIN input logic (RTL aware focus)
        const inputs = document.querySelectorAll('.pin-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            // Only allow numbers
            input.addEventListener('keypress', (e) => {
                if (!/[0-9]/.test(e.key)) {
                    e.preventDefault();
                }
            });
        });

        // Form submission animation
        document.getElementById('setupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> <span>در حال پردازش...</span>';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> <span>حساب با موفقیت ایجاد شد</span>';
                btn.classList.replace('bg-primary', 'bg-secondary');
            }, 1500);
        });
    </script>
