<!DOCTYPE html>

<html dir="rtl" lang="fa"><head>

                    "tertiary-container": "#ac6200",

                    "primary": "#006194",
                    "on-tertiary-container": "#fffbff",
                    "tertiary-fixed-dim": "#ffb875",
                    "tertiary": "#894d00",
                    "inverse-on-surface": "#eaf1ff",
                    "surface-container-high": "#dce9ff",
                    "secondary-fixed-dim": "#6bd8cb",
                    "tertiary-fixed": "#ffdcc0",
                    "on-tertiary": "#ffffff",
                    "outline-variant": "#bfc7d2",
                    "on-surface": "#0d1c2e",
                    "on-secondary": "#ffffff",

<style>
        body {
            font-family: 'Noto Sans', sans-serif;
            background-color: #f8f9ff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .account-card.active {
            border-color: #006194;
            background-color: #eff4ff;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-margin-desktop py-xl relative overflow-hidden">
<!-- Subtle Animated Background Element -->
<div class="absolute top-0 right-0 -mr-24 -mt-24 w-96 h-96 bg-primary-fixed-dim opacity-10 rounded-full blur-3xl"></div>
<div class="absolute bottom-0 left-0 -ml-24 -mb-24 w-80 h-80 bg-secondary-fixed opacity-10 rounded-full blur-3xl"></div>
<!-- Login Container -->
<div class="w-full max-w-[480px] z-10">
<!-- Brand Header -->
<div class="flex flex-col items-center mb-lg">
<img alt="تراز نوین" class="w-24 h-24 mb-md" src="https://lh3.googleusercontent.com/aida/AP1WRLsnou6haWyFZMgZduFxNhEEme9NbGDprALH7_zuKUnsiT7WZDykbZ9O1cfPMYSlJgV5gN7Z2f3K6pbemgkkzf7IB7ziXD5awV4BF8AAppOPu4UV1uj5R2_KJFoVd3_blnZTeiWXEdQbByRf-3Dsk9mE1qUlWXvMYjZK_egngSoisMrq5dSRoSCyYKzFKdSgyUAjYnySHj5YCK-Hhz-X1myDyxgERnLwv1xgRgh8F4c5A5N930968cyUftvB"/>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">تراز نوین</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-sm">نرم‌افزار جامع مدیریت مالی و حسابداری</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-xl shadow-sm glass-effect">
<div class="mb-lg text-right">
<h2 class="font-headline-md text-headline-md text-on-surface">خوش آمدید</h2>
<p class="font-body-md text-body-md text-on-surface-variant">لطفاً حساب کاربری خود را انتخاب کنید</p>
</div>
<!-- Account Selection Grid -->
<div class="grid grid-cols-2 gap-md mb-lg">
<!-- Admin Account -->
<button class="account-card flex flex-col items-center p-md border border-outline-variant rounded-xl transition-all hover:bg-surface-container active:scale-95 group active" onclick="selectAccount(this)" type="button">
<div class="w-16 h-16 bg-surface-container-high rounded-full flex items-center justify-center mb-sm group-hover:bg-primary-fixed">
<span class="material-symbols-outlined text-primary text-[32px]">admin_panel_settings</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface">مدیر سیستم</span>
</button>
<!-- Seller Account -->
<button class="account-card flex flex-col items-center p-md border border-outline-variant rounded-xl transition-all hover:bg-surface-container active:scale-95 group" onclick="selectAccount(this)" type="button">
<div class="w-16 h-16 bg-surface-container-high rounded-full flex items-center justify-center mb-sm group-hover:bg-secondary-container">
<span class="material-symbols-outlined text-secondary text-[32px]">point_of_sale</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface">فروشنده</span>
</button>
</div>
<!-- Form Inputs -->
<form class="space-y-lg" onsubmit="event.preventDefault();">
<div class="space-y-sm">
<label class="block font-label-sm text-label-sm text-on-surface-variant pr-xs">رمز عبور</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-primary outline-none px-md py-md text-left font-numeric-data transition-colors placeholder:text-outline" placeholder="••••••••" type="password"/>
<span class="absolute right-md top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant opacity-50">lock</span>
</div>
<div class="flex justify-between items-center px-xs mt-xs">
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">فراموشی رمز عبور؟</a>
</div>
</div>
<!-- Security Options -->
<div class="flex items-center justify-center gap-xl py-sm">
<button class="flex flex-col items-center gap-xs text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 0;">fingerprint</span>
<span class="font-label-sm text-label-sm">اثر انگشت</span>
</button>
<div class="w-[1px] h-8 bg-outline-variant"></div>
<button class="flex flex-col items-center gap-xs text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[28px]">key</span>
<span class="font-label-sm text-label-sm">کلید امنیتی</span>
</button>
</div>
<!-- Submit -->
<button class="w-full bg-primary text-on-primary py-md rounded-full font-headline-md text-headline-md flex items-center justify-center gap-md hover:bg-primary-container transition-all active:scale-95 shadow-sm">
<span>ورود به داشبورد</span>
<span class="material-symbols-outlined transform rotate-180">arrow_forward</span>
</button>
</form>
</div>
<!-- Support Footer -->
<div class="mt-xl flex flex-col items-center gap-md">
<div class="flex gap-lg">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary" href="#">تماس با پشتیبانی</a>
<span class="text-outline-variant">|</span>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary" href="#">قوانین و مقررات</a>
</div>
<p class="font-label-sm text-label-sm text-outline">© ۱۴۰۲ تمامی حقوق برای تراز نوین محفوظ است</p>
</div>
</div>
</main>
<!-- Interactive Script -->
<script>
        function selectAccount(element) {
            document.querySelectorAll('.account-card').forEach(card => {
                card.classList.remove('active', 'border-primary', 'bg-surface-container-low');
                card.classList.add('border-outline-variant');
            });
            element.classList.add('active', 'border-primary', 'bg-surface-container-low');
            element.classList.remove('border-outline-variant');
        }

        // Add visual interest to the password field interaction
        const passInput = document.querySelector('input[type="password"]');
        passInput.addEventListener('focus', () => {
            passInput.parentElement.querySelector('.material-symbols-outlined').style.opacity = '1';
            passInput.parentElement.querySelector('.material-symbols-outlined').style.color = 'var(--tw-text-opacity)';
        });
        passInput.addEventListener('blur', () => {
            passInput.parentElement.querySelector('.material-symbols-outlined').style.opacity = '0.5';
        });
    </script>
</body></html>
