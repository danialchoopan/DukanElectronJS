<!DOCTYPE html>

<html class="dark" dir="rtl" lang="fa"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: 'Noto Sans', sans-serif;
        }

        .pin-input:focus {
            box-shadow: 0 0 0 2px rgba(0, 97, 148, 0.4);
        }

        /* Glassmorphism effect for the setup card */
        .glass-card {
            background: rgba(35, 49, 68, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#eff4ff",
                        "inverse-primary": "#93ccff",
                        "secondary-fixed": "#89f5e7",
                        "surface-container-highest": "#d5e3fc",
                        "outline": "#707881",
                        "on-primary-container": "#fdfcff",
                        "primary-fixed-dim": "#93ccff",
                        "on-tertiary-fixed-variant": "#6b3b00",
                        "on-tertiary-fixed": "#2d1600",
                        "surface": "#f8f9ff",
                        "on-surface-variant": "#3f4850",
                        "on-secondary-fixed": "#00201d",
                        "inverse-surface": "#233144",
                        "surface-container": "#e6eeff",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "on-primary-fixed": "#001d31",
                        "surface-variant": "#d5e3fc",
                        "on-secondary-fixed-variant": "#005049",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#004b73",
                        "on-secondary-container": "#006f66",
                        "background": "#f8f9ff",
                        "surface-tint": "#006398",
                        "secondary": "#006a61",
                        "primary-fixed": "#cce5ff",
                        "tertiary-container": "#ac6200",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#006194",
                        "on-tertiary-container": "#fffbff",
                        "tertiary-fixed-dim": "#ffb875",
                        "tertiary": "#894d00",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-container-high": "#dce9ff",
                        "secondary-fixed-dim": "#6bd8cb",
                        "tertiary-fixed": "#ffdcc0",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#bfc7d2",
                        "on-surface": "#0d1c2e",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#86f2e4",
                        "surface-dim": "#ccdbf3",
                        "on-error-container": "#93000a",
                        "on-background": "#0d1c2e",
                        "surface-bright": "#f8f9ff",
                        "error-container": "#ffdad6",
                        "primary-container": "#007bb9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "unit": "4px",
                        "gutter": "16px",
                        "lg": "24px",
                        "xl": "48px",
                        "xs": "4px",
                        "sm": "8px",
                        "margin-mobile": "16px",
                        "margin-desktop": "32px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "headline-md": ["IBM Plex Sans"],
                        "headline-lg": ["IBM Plex Sans"],
                        "numeric-data": ["IBM Plex Sans"],
                        "label-sm": ["IBM Plex Sans"],
                        "body-lg": ["Noto Sans"],
                        "body-md": ["Noto Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "36px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "48px", "fontWeight": "700"}],
                        "numeric-data": ["20px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "label-sm": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-dim text-on-surface dark:bg-inverse-surface dark:text-inverse-on-surface min-h-screen flex flex-col antialiased overflow-hidden">
<!-- Atmospheric background elements -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="absolute -top-[20%] -right-[10%] w-[60%] h-[60%] bg-primary opacity-[0.05] blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -left-[5%] w-[40%] h-[40%] bg-secondary opacity-[0.05] blur-[100px] rounded-full"></div>
</div>
<!-- Top Navigation Bar (Simplified for Setup) -->
<header class="w-full top-0 flex flex-row-reverse justify-between items-center px-margin-desktop py-md z-50">
<div class="flex flex-row-reverse items-center gap-md">
<img alt="لوگوی تراز نوین" class="w-12 h-12 object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLsnou6haWyFZMgZduFxNhEEme9NbGDprALH7_zuKUnsiT7WZDykbZ9O1cfPMYSlJgV5gN7Z2f3K6pbemgkkzf7IB7ziXD5awV4BF8AAppOPu4UV1uj5R2_KJFoVd3_blnZTeiWXEdQbByRf-3Dsk9mE1qUlWXvMYjZK_egngSoisMrq5dSRoSCyYKzFKdSgyUAjYnySHj5YCK-Hhz-X1myDyxgERnLwv1xgRgh8F4c5A5N930968cyUftvB"/>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-inverse-primary">تراز نوین</h1>
</div>
<div class="flex items-center gap-md">
<div class="flex items-center gap-xs cursor-pointer hover:bg-surface-container dark:hover:bg-surface-variant p-sm rounded-xl transition-colors">
<span class="material-symbols-outlined text-on-surface-variant dark:text-surface-variant">help</span>
<span class="font-label-sm text-label-sm text-on-surface-variant dark:text-surface-variant">راهنما</span>
</div>
</div>
</header>
<!-- Main Setup Canvas -->
<main class="flex-grow flex items-center justify-center relative px-margin-desktop">
<div class="glass-card w-full max-w-[560px] p-xl rounded-xl border border-outline-variant/20 shadow-xl z-10">
<!-- Header Section -->
<div class="text-center mb-xl">
<h2 class="font-headline-lg text-headline-lg text-on-surface dark:text-inverse-on-surface mb-sm">تنظیمات اولیه فروشگاه</h2>
<p class="font-body-md text-body-md text-on-surface-variant dark:text-surface-variant">لطفاً مشخصات اصلی کسب‌وکار خود را برای شروع به کار در سیستم وارد کنید.</p>
</div>
<form class="space-y-lg" id="setupForm">
<!-- Shop Name Input -->
<div class="space-y-sm">
<label class="block font-label-sm text-label-sm text-on-surface dark:text-inverse-on-surface text-right pr-xs" for="shopName">نام فروشگاه / کسب‌وکار</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-on-surface-variant/50">store</span>
<input class="w-full h-14 bg-surface-container-low dark:bg-surface-dim/40 border-b-2 border-outline-variant focus:border-primary transition-all text-right px-md outline-none font-body-md text-body-md rounded-t-lg" id="shopName" name="shopName" placeholder="مثلاً: بازرگانی نوین" type="text"/>
</div>
</div>
<!-- Contact Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<div class="space-y-sm">
<label class="block font-label-sm text-label-sm text-on-surface dark:text-inverse-on-surface text-right pr-xs" for="phone">شماره تماس ثابت</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-on-surface-variant/50">call</span>
<input class="w-full h-14 bg-surface-container-low dark:bg-surface-dim/40 border-b-2 border-outline-variant focus:border-primary transition-all text-left px-md outline-none font-numeric-data text-numeric-data rounded-t-lg" dir="ltr" id="phone" name="phone" placeholder="۰۲۱-۸۸۸۸..." type="tel"/>
</div>
</div>
<div class="space-y-sm">
<label class="block font-label-sm text-label-sm text-on-surface dark:text-inverse-on-surface text-right pr-xs" for="mobile">شماره همراه</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-on-surface-variant/50">smartphone</span>
<input class="w-full h-14 bg-surface-container-low dark:bg-surface-dim/40 border-b-2 border-outline-variant focus:border-primary transition-all text-left px-md outline-none font-numeric-data text-numeric-data rounded-t-lg" dir="ltr" id="mobile" name="mobile" placeholder="۰۹۱۲..." type="tel"/>
</div>
</div>
</div>
<!-- PIN Code Section -->
<div class="py-md">
<div class="flex flex-col items-center gap-md">
<label class="font-label-sm text-label-sm text-on-surface dark:text-inverse-on-surface">تعیین رمز عبور سریع (۴ رقمی)</label>
<div class="flex flex-row-reverse gap-md" id="pin-container">
<input class="pin-input w-16 h-20 bg-surface-container-low dark:bg-surface-dim/50 border-2 border-outline-variant rounded-xl text-center font-numeric-data text-[32px] text-primary focus:border-primary outline-none transition-all" data-index="0" maxlength="1" type="text"/>
<input class="pin-input w-16 h-20 bg-surface-container-low dark:bg-surface-dim/50 border-2 border-outline-variant rounded-xl text-center font-numeric-data text-[32px] text-primary focus:border-primary outline-none transition-all" data-index="1" maxlength="1" type="text"/>
<input class="pin-input w-16 h-20 bg-surface-container-low dark:bg-surface-dim/50 border-2 border-outline-variant rounded-xl text-center font-numeric-data text-[32px] text-primary focus:border-primary outline-none transition-all" data-index="2" maxlength="1" type="text"/>
<input class="pin-input w-16 h-20 bg-surface-container-low dark:bg-surface-dim/50 border-2 border-outline-variant rounded-xl text-center font-numeric-data text-[32px] text-primary focus:border-primary outline-none transition-all" data-index="3" maxlength="1" type="text"/>
</div>
<p class="font-label-sm text-[12px] text-on-surface-variant dark:text-surface-variant text-center">این کد برای ورود سریع و تایید تراکنش‌ها استفاده خواهد شد.</p>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-14 bg-primary hover:bg-primary-container text-on-primary font-headline-md text-body-lg rounded-xl flex items-center justify-center gap-md transition-all active:scale-[0.98] mt-xl shadow-lg" type="submit">
                    ثبت و ورود به داشبورد
                    <span class="material-symbols-outlined transform rotate-180">arrow_forward</span>
</button>
</form>
</div>
</main>
<!-- Footer -->
<footer class="w-full bottom-0 flex flex-row-reverse justify-between items-center px-margin-desktop py-md bg-surface-container-lowest dark:bg-inverse-surface border-t border-outline-variant/10">
<p class="font-label-sm text-label-sm text-on-surface-variant dark:text-surface-variant">© ۱۴۰۲ تمامی حقوق برای تراز نوین محفوظ است</p>
<div class="flex flex-row-reverse gap-lg">
<a class="font-label-sm text-label-sm text-on-surface-variant dark:text-surface-variant hover:text-primary transition-colors" href="#">قوانین و مقررات</a>
<a class="font-label-sm text-label-sm text-on-surface-variant dark:text-surface-variant hover:text-primary transition-colors" href="#">تماس با پشتیبانی</a>
</div>
</footer>
<script>
        // PIN input focus management (RTL - moves from index 0 to 3, which is right to left)
        const inputs = document.querySelectorAll('.pin-input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
            
            // Allow only numbers
            input.addEventListener('keypress', (e) => {
                if (!/[0-9]/.test(e.key)) {
                    e.preventDefault();
                }
            });
        });

        // Simple form animation on submit
        const form = document.getElementById('setupForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> در حال پردازش...';
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            
            setTimeout(() => {
                alert('تنظیمات با موفقیت ذخیره شد. در حال انتقال به داشبورد...');
                location.reload();
            }, 1500);
        });

        // Micro-interaction: Focus effect on form containers
        const fields = document.querySelectorAll('input');
        fields.forEach(field => {
            field.addEventListener('focus', () => {
                field.parentElement.querySelector('.material-symbols-outlined').style.color = '#006194';
            });
            field.addEventListener('blur', () => {
                field.parentElement.querySelector('.material-symbols-outlined').style.color = '';
            });
        });
    </script>
</body></html>
